name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2

      - uses: oven-sh/setup-bun@v2.2.0
        with:
          bun-version: 1.3.9

      - uses: extractions/setup-just@v4.0.0

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Typecheck
        run: just typecheck

      - name: Lint + format check
        run: just check

      - name: Test
        run: just test

      - name: Build
        run: just build
